{% extends 'base.html' %}
{% load static %}

{% block title %}{{ LANG.login }} - {{ LANG.purchase_system }}{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }
    
    .login-card {
        background: linear-gradient(145deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
        border: 1px solid rgba(71, 85, 105, 0.5);
        border-radius: 1.5rem;
        padding: 3rem;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .login-icon {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
        font-size: 2rem;
        color: white;
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }
    
    .login-title {
        font-size: 1.75rem;
        font-weight: 700;
        color: #f8fafc;
        margin-bottom: 0.5rem;
    }
    
    .login-subtitle {
        color: #94a3b8;
        font-size: 0.875rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #e2e8f0;
        margin-bottom: 0.5rem;
    }
    
    .form-control {
        width: 100%;
        padding: 0.875rem 1rem;
        font-size: 1rem;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(71, 85, 105, 0.5);
        border-radius: 0.75rem;
        color: #f8fafc;
        transition: all 0.2s ease;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .form-control::placeholder {
        color: #64748b;
    }
    
    .btn-login {
        width: 100%;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 600;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: white;
        border: none;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5);
    }
    
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(71, 85, 105, 0.3);
    }
    
    .login-footer a {
        color: #60a5fa;
        text-decoration: none;
    }
    
    .login-footer a:hover {
        text-decoration: underline;
    }
    
    .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
    }
    
    .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(71, 85, 105, 0.3);
    }
    
    .divider span {
        padding: 0 1rem;
        color: #64748b;
        font-size: 0.875rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card fade-in">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-shopping-cart"></i>
            </div>
            <h1 class="login-title">{{ LANG.purchase_system }}</h1>
            <p class="login-subtitle">{{ LANG.login_subtitle }}</p>
        </div>
        
        <form method="post" action="{% url 'accounts:login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="id_email">{{ LANG.email }}</label>
                <input type="email" name="email" id="id_email" class="form-control" 
                       placeholder="{{ LANG.email }}" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="id_password">{{ LANG.password }}</label>
                <input type="password" name="password" id="id_password" class="form-control" 
                       placeholder="{{ LANG.password }}" required autocomplete="off">
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt ml-2"></i>
                {{ LANG.login_button }}
            </button>
        </form>
        
    </div>
</div>
{% endblock %}
