{% extends 'base.html' %}
{% load static %}

{% block title %}Add Material Price - Purchase System{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Add Material Price for Supplier: {{ supplier.name }}</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label for="id_material">Material</label>
                            <select name="material" id="id_material" class="form-control" required>
                                <option value="">Select a material</option>
                                {% for material in materials %}
                                <option value="{{ material.id }}">{{ material.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="id_price">Price</label>
                            <input type="number" name="price" id="id_price" class="form-control" step="0.01" required>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="id_notes">Notes</label>
                            <textarea name="notes" id="id_notes" class="form-control" rows="3"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i>
                                Save
                            </button>
                            <a href="{% url 'suppliers:supplier_detail' supplier.id %}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
